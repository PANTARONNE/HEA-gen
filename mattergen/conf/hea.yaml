hydra:
  run:
    dir: ${oc.env:OUTPUT_DIR,outputs/singlerun/${now:%Y-%m-%d}/${now:%H-%M-%S}}

auto_resume: true

defaults:
  - data_module: hea
  - trainer: default
  - lightning_module: default
  - lightning_module/diffusion_module: atom_only
  - lightning_module/diffusion_module/model: mattergen
  - lightning_module/diffusion_module/corruption: atom_only
