_target_: pytorch_lightning.Trainer
accelerator: 'gpu'
devices: 1
num_nodes: 1
precision: 32
max_epochs: ${data_module.max_epochs}

# Gradient accumulation locks the *effective* batch at 512 regardless of card
# count (see data_module/hea.yaml: per-GPU batch = 512 / accumulate / devices).
# Each structure is a dense 64-atom FCC(111) slab, so the per-GPU batch must
# stay small to fit a 24 GB card. With the common 2-GPU setup this yields
# 512 / 16 / 2 = 16 structures/GPU. Raise accumulate (32, 64, ...) to shrink
# the per-GPU batch further if you still hit OOM; the effective batch stays 512.
accumulate_grad_batches: 16

gradient_clip_val: 0.5
gradient_clip_algorithm: value
check_val_every_n_epoch: 5
strategy:
  _target_: pytorch_lightning.strategies.ddp.DDPStrategy
  find_unused_parameters: true

logger:
  _target_: pytorch_lightning.loggers.WandbLogger
  project: crystal-generation
  job_type: train
  settings:
    _target_: wandb.Settings
    start_method: fork
    _save_requirements: False

callbacks:
  - _target_: pytorch_lightning.callbacks.LearningRateMonitor
    logging_interval: step
    log_momentum: False
  - _target_: pytorch_lightning.callbacks.ModelCheckpoint
    monitor: loss_val
    mode: min
    save_top_k: 1
    save_last: True
    verbose: false
    every_n_epochs: 1
    filename: "{epoch}-{loss_val:.2f}"
  - _target_: pytorch_lightning.callbacks.TQDMProgressBar
    refresh_rate: 50
  - _target_: mattergen.common.data.callback.SetPropertyScalers
